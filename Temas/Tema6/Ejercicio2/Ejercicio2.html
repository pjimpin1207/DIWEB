<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Publicación de Vídeo con IA</title>
    <style>
        video {
            border: 2px solid black;
            width: 640px;
            height: 480px;
            display: block;
            margin-bottom: 15px;
            background-color: #000;
        }
        .enlaces {
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h1>Presentación IA: Optimización Web</h1>

    <video controls poster="caratula.jpg">
        <source src="video.webm" type="video/webm">
        <source src="video.mp4" type="video/mp4">
        <source src="video.ogv" type="video/ogg">
        
        <p>Tu navegador no es compatible con los formatos de vídeo modernos (WebM/MP4).</p>
    </video>

    <div class="enlaces">
        <a href="video.mp4" download="video_ia_optimizado.mp4">Descargar vídeo (MP4)</a> | 
        
        <a href="video.mp4" target="_blank">Abrir vídeo en una pestaña nueva</a>
    </div>

</body>
</html>
